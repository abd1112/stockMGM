{% extends "base.html" %}
{% block title %}Contact{% endblock %}

{% block content %}
  
    <h2>Welcome!</h2>
    <h4>My Inbox</h4>
    
    <div>
        <table class="table table-dark table-striped" id="operationsTable" border="1" cellpadding="5">
            <thead>
                <tr>
                    <th>Subject</th>
                    <th>Content</th>
                </tr>
            </thead>
            <tbody>
                {% for message in myInBox %}
                <tr>
                    <td>{{ message.subject }}</td>
                    <td>{{ message.content }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
{% endblock %}
