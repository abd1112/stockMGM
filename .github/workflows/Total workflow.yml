on: 
    push:
        branches: [ master ]
    
    pull_request:
        branches: [ master ]


jobs:
    nmap:
        runs-on: ubuntu-latest

        steps:
    
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.12"

            - name: install dependencies
              run: |
                python -m pip install --upgrade pip

                if [ -f requirements.txt ]; then
                    pip install -r requirements.txt
                fi
            
            - name: Check Syntax
              run: |
                python -m py_compile stock.py

            - name: Install tools
              run: |
                sudo apt-get update
                sudo apt-get install -y curl nmap xsltproc

            - name: Verify Flask app starts
              run: |
                python stock.py &
                sleep 10
            
            - name: Check server
              run: |
                curl http://127.0.0.1:5000

            - name: Nmap Test output
              run: |
                nmap -p 5000 127.0.0.1 -sV -oX nmap.xml
                xsltproc -o nmap.html /usr/share/nmap/nmap.xsl nmap.xml
            
            - name: Upload Saved Output File
              uses: actions/upload-artifact@v4
              with:
                name: Nmap Artifacts
                path: |
                  nmap.html
                  nmap.xml

    whatweb:
        runs-on: ubuntu-latest

        steps:
    
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.12"

            - name: install dependencies
              run: |
                python -m pip install --upgrade pip

                if [ -f requirements.txt ]; then
                    pip install -r requirements.txt
                fi
            
            - name: Check Syntax
              run: |
                python -m py_compile stock.py

            - name: Install tools
              run: |
                sudo apt-get update
                sudo apt-get install -y curl whatweb

            - name: Verify Flask app starts
              run: |
                python stock.py &
                sleep 10
            
            - name: Check server
              run: |
                curl http://127.0.0.1:5000
            
            - name: WhatWeb Test
              run: |
                whatweb -v -a 3 --log-xml=whatweb.xml 127.0.0.1:5000
            
            - name: Upload Saved Output File
              uses: actions/upload-artifact@v4
              with:
                name: WhatWeb Artifacts
                path: 
                  whatweb.xml

    nikto:
        runs-on: ubuntu-latest

        steps:
    
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.12"

            - name: install dependencies
              run: |
                python -m pip install --upgrade pip

                if [ -f requirements.txt ]; then
                    pip install -r requirements.txt
                fi
            
            - name: Check Syntax
              run: |
                python -m py_compile stock.py

            - name: Install tools
              run: |
                sudo apt-get update
                sudo apt-get install -y curl nikto

            - name: Verify Flask app starts
              run: |
                python stock.py &
                sleep 10
            
            - name: Check server
              run: |
                curl http://127.0.0.1:5000

            - name: Nikto Test
              run: |
                nikto -host http://192.168.1.230:5000/ -C all -o nikto.htm
            
            - name: Upload Saved Output File
              uses: actions/upload-artifact@v4
              with:
                name: Nikto Artifacts
                path: |
                  nikto.htm

    zap_scan:
        runs-on: ubuntu-latest

        steps:
    
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.12"

            - name: install dependencies
              run: |
                python -m pip install --upgrade pip

                if [ -f requirements.txt ]; then
                    pip install -r requirements.txt
                fi
            
            - name: Check Syntax
              run: |
                python -m py_compile stock.py

            - name: Install tools
              run: |
                sudo apt-get update
                sudo apt-get install -y curl nikto

            - name: Verify Flask app starts
              run: |
                python stock.py &
                sleep 10
            
            - name: Check server
              run: |
                curl http://127.0.0.1:5000
       
            - name: ZAP Scan
              uses: zaproxy/action-baseline@v0.15.0
              with:
                docker_name: 'ghcr.io/zaproxy/zaproxy:bare'
                target: 'http://127.0.0.1:5000'
                rules_file_name: '.zap/rules.tsv'
                cmd_options: '-a'
            
            #- name: ZAP Scan
             # uses: zaproxy/action-baseline@v0.6.1
              #with:
               # docker_name: 'ghcr.io/zaproxy/zaproxy:stable'
                #target: 'http://127.0.0.1:5000'
                #rules_file_name: '.zap/rules.tsv'
                #cmd_options: '-a'
            
            - name: Upload ZAP Report
              uses: actions/upload-artifact@v4
              with:
                name: zap-report
                path: |
                    report_html.html
                    report_json.json
    
    merge-artifacts:
        needs:
            - nmap
            - whatweb
            - nikto
        runs-on: ubuntu-latest
        steps:
          - name: Merge all parallel artifacts
            uses: actions/upload-artifact/merge@v4
            with:
                name: final-combined-artifact
                pattern: |
                    nmap.html
                    nmap.xml
                    whatweb.xml
                    nikto.htm
                delete-merged: true