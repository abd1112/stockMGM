name: Nmap Test

on: 
    push:
        branches: [ master ]
    
    pull_request:
        branches: [ master ]


jobs:
    build:
        runs-on: ubuntu-latest

        steps:
    
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.12"

            - name: install dependencies
              run: |
                python -m pip install --upgrade pip

                if [ -f requirements.txt ]; then
                    pip install -r requirements.txt
                fi
            
            - name: Check Syntax
              run: |
                python -m py_compile stock.py

            - name: Install tools
              run: |
                sudo apt-get update
                sudo apt-get install -y curl nmap xsltproc

            - name: Verify Flask app starts
              run: |
                python stock.py &
                sleep 30
            
            - name: Check server
              run: |
                curl http://127.0.0.1:5000

            - name: Nmap Test output
              run: |
                nmap -p 5000 127.0.0.1 -sV -oX nmap.xml
                xsltproc -o nmap.html /usr/share/nmap/nmap.xsl nmap.xml
            
            - name: WhatWeb Test output
              run: |
                whatweb -v -a 3 --log-json=whatweb.json 127.0.0.1:5000
            
            - name: Upload Saved Output File
              uses: actions/upload-artifact@v4
              with:
                name: deployment-logs
                path: nmap.html
                path: nmap.xml
                path: whatweb.json
            