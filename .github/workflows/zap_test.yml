name: Nmap Test

on: 
    push:
        branches: [ master ]
    
    pull_request:
        branches: [ master ]


jobs:
    build:
        runs-on: ubuntu-latest

        steps:
    
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.12"

            - name: install dependencies
              run: |
                python -m pip install --upgrade pip

                if [ -f requirements.txt ]; then
                    pip install -r requirements.txt
                fi
            
            - name: Check Syntax
              run: |
                python -m py_compile stock.py

            - name: Install tools
              run: |
                sudo apt-get update
                sudo apt-get install -y curl

            - name: Verify Flask app starts
              run: |
                python stock.py &
                sleep 30
            
            - name: Check server
              run: |
                curl http://127.0.0.1:5000


            - name: Run ZAP Baseline Scan
              run: |
                docker pull ghcr.io/zaproxy/zap-archives/zap2docker-stable:2.14.0

                docker run --rm \
                  --network=host \
                  -v $(pwd):/zap/wrk:rw \
                  ghcr.io/zaproxy/zap-archives/zap2docker-stable:2.14.0 \
                  zap-baseline.py \
                  -t http://127.0.0.1:5000 \
                  -r zap-report.html
                  
            - name: Upload ZAP Report
              uses: actions/upload-artifact@v4
              with:
                name: zap-report
                path: zap-report.html
                        