name: myFirstCI

on:
  push:
    branches: [ master ]

  pull_request:
    branches: [ master ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip

        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi

    - name: Check syntax
      run: |
        python -m py_compile stock.py

    - name: Install curl
      run: |
        sudo apt-get update
        sudo apt-get install -y curl

    - name: Verify Flask app starts
      run: |
        python stock.py > flask.log 2>&1 &
        sleep 20
    
    - name: Show Flask log
      run: |
        cat flask.log